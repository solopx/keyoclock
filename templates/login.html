<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key O'Clock — Login</title>
<link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
<style>
@font-face {
  font-family: 'IBM Plex Sans';
  src: url('/static/fonts/IBMPlexSans-Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'IBM Plex Sans';
  src: url('/static/fonts/IBMPlexSans-Medium.woff2') format('woff2');
  font-weight: 500; font-style: normal;
}
@font-face {
  font-family: 'IBM Plex Sans';
  src: url('/static/fonts/IBMPlexSans-SemiBold.woff2') format('woff2');
  font-weight: 600; font-style: normal;
}
@font-face {
  font-family: 'IBM Plex Mono';
  src: url('/static/fonts/IBMPlexMono-Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'IBM Plex Mono';
  src: url('/static/fonts/IBMPlexMono-SemiBold.woff2') format('woff2');
  font-weight: 600; font-style: normal;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: #0c1016;
  color: #f1f5f9;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(circle at 2px 2px, rgba(59,130,246,0.15) 1px, transparent 0),
    linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 32px 32px, 64px 64px, 64px 64px;
}

.bg-glow {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(circle at 50% 50%, rgba(59,130,246,0.15) 0%, transparent 80%);
}

.bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(to top right, rgba(37,99,235,0.1), transparent, rgba(99,102,241,0.1));
}

.bg-noise {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  opacity: 0.04;
}

.wrap {
  position: relative; z-index: 10;
  width: 100%; max-width: 550px;
  padding: 24px;
}

.brand {
  text-align: center;
  padding: 32px 32px 20px;
}

.brand img {
  height: 120px; width: auto;
  margin-bottom: 28px;
}

.brand h2 {
  color: #64748b;
  font-size: 17px;
  font-weight: 400;
  margin-top: 10px;
}

.form-wrap {
  padding: 16px 32px 32px;
}

.field {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 20px;
}

.field label {
  font-size: 13px; font-weight: 600;
  color: #94a3b8;
  padding-left: 4px;
}

.input-wrap {
  position: relative;
}

.input-wrap svg.icon-left {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 18px; height: 18px; color: #94a3b8;
  pointer-events: none; z-index: 1;
  transition: color 0.2s;
}

.input-wrap:focus-within svg.icon-left {
  color: #60a5fa;
}

.input-wrap input {
  width: 100%;
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 13px 44px 13px 40px;
  color: #f1f5f9;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  outline: none;
  box-shadow: 0 4px 20px -2px rgba(0,0,0,0.4);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrap input:focus {
  border-color: rgba(59,130,246,0.5);
  box-shadow: 0 4px 20px -2px rgba(0,0,0,0.4), 0 0 0 3px rgba(59,130,246,0.15);
}

.input-wrap input::placeholder { color: #475569; }

.btn-eye {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: #64748b; display: flex; align-items: center;
  padding: 2px;
  transition: color 0.2s;
}
.btn-eye:hover { color: #94a3b8; }

.btn-login {
  width: 100%; padding: 14px;
  background: #3b82f6;
  border: none; border-radius: 8px;
  color: #fff;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 50px;
  box-shadow: 0 10px 25px -5px rgba(59,130,246,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: opacity 0.2s, transform 0.1s;
}
.btn-login:hover { opacity: 0.9; }
.btn-login:active { transform: scale(0.98); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #f87171;
  margin-top: 16px;
  display: none;
  text-align: center;
}

.status-bar {
  margin-top: 28px;
  text-align: center;
  opacity: 0.6;
}

.version {
  font-size: 11px;
  color: #64748b;
  font-family: 'IBM Plex Mono', monospace;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-gradient"></div>
<div class="bg-noise"></div>

<div class="wrap">
  <div class="brand">
    <img src="{{ url_for('static', filename='images/logo.png') }}" style="transform: scale(1.2)" alt="Key O'Clock">
      <h2>Gestão e Monitoramento de Licenças</h2>
  </div>

  <div class="form-wrap">
    <div class="field">
      <label for="username">Usuário</label>
      <div class="input-wrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 12c2.7 0 4-1.3 4-4s-1.3-4-4-4-4 1.3-4 4 1.3 4 4 4zm0 2c-2.7 0-8 1.4-8 4v1h16v-1c0-2.6-5.3-4-8-4z"/>
        </svg>
        <input type="text" id="username" autocomplete="username" placeholder="Seu nome de usuário">
      </div>
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <div class="input-wrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
        </svg>
        <input type="password" id="password" autocomplete="current-password" placeholder="Sua senha de acesso">
        <button class="btn-eye" type="button" id="eyeBtn" onclick="togglePwd()" aria-label="Mostrar senha">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="loginText">Entrar</span>
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" id="loginIcon">
        <path d="M10 17l5-5-5-5v3H3v4h7v3zm7-13h-7v2h7v14h-7v2h7a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
      </svg>
    </button>
    <div class="error-msg" id="errMsg"></div>
  </div>

  <div class="status-bar">
    <span class="version">v1.0 · Key O'Clock</span>
  </div>
</div>

<div class="wrap" id="changeWrap" style="display:none">
  <div class="brand">
    <img src="{{ url_for('static', filename='images/logo.png') }}" style="transform: scale(1.2)" alt="Key O'Clock">
    <h2>Gestão e Monitoramento de Licenças</h2>
  </div>

  <div class="form-wrap">
    <p style="color:#f59e0b;font-size:14px;margin-bottom:24px;text-align:center">
      Primeiro acesso — defina uma nova senha para continuar.
    </p>

    <div class="field">
      <label for="newPassword">Nova senha</label>
      <div class="input-wrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
        </svg>
        <input type="password" id="newPassword" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
      </div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirmar nova senha</label>
      <div class="input-wrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/>
        </svg>
        <input type="password" id="confirmPassword" autocomplete="new-password" placeholder="Repita a nova senha">
      </div>
    </div>

    <button class="btn-login" id="changeBtn" onclick="doChangePassword()">
      <span id="changeText">Definir senha</span>
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" id="changeIcon">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
      </svg>
    </button>
    <div class="error-msg" id="changeErr"></div>
  </div>

  <div class="status-bar">
    <span class="version">v1.0 · Key O'Clock</span>
  </div>
</div>

<script>
  function togglePwd() {
    const inp  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const show = inp.type === 'password';
    inp.type   = show ? 'text' : 'password';
    icon.innerHTML = show
      ? '<path d="M12 7c2.8 0 5 2.2 5 5l2.9-2.9C18.2 7.2 15.3 5.5 12 5.5 8.7 5.5 5.8 7.2 4.1 9.1L7 12c0-2.8 2.2-5 5-5zm-9.8.4L4 9.2A10.5 10.5 0 0 0 1.5 12C3.2 16.4 7.3 19.5 12 19.5c1.6 0 3.1-.3 4.5-.9l2.2 2.2 1.4-1.4L3.6 6l-1.4 1.4zM12 17c-2.8 0-5-2.2-5-5 0-.9.2-1.7.6-2.4l1.6 1.6c-.1.3-.2.5-.2.8 0 1.7 1.3 3 3 3 .3 0 .5-.1.8-.2l1.6 1.6c-.7.4-1.5.6-2.4.6zm4.3-4.8c.1-.3.2-.5.2-.8 0-1.7-1.3-3-3-3-.3 0-.5.1-.8.2L11 7l1-.5A5 5 0 0 1 17 12l-.7-.8z"/>'
      : '<path d="M12 4.5C7 4.5 2.7 7.6 1 12c1.7 4.4 6 7.5 11 7.5s9.3-3.1 11-7.5C21.3 7.6 17 4.5 12 4.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>';
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  async function doLogin() {
    const btn  = document.getElementById('loginBtn');
    const txt  = document.getElementById('loginText');
    const icon = document.getElementById('loginIcon');
    const err  = document.getElementById('errMsg');
    btn.disabled    = true;
    txt.textContent = 'Entrando...';
    icon.style.display = 'none';
    err.style.display = 'none';

    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });

    const data = await res.json();
    if (data.success) {
      document.getElementById('password').value = '';
      if (data.must_change_password) {
        _showChangeForm(data.user_id);
      } else {
        globalThis.location.href = '/dashboard';
      }
    } else {
      err.textContent   = data.error || 'Erro ao fazer login';
      err.style.display = 'block';
      btn.disabled      = false;
      txt.textContent   = 'Entrar';
      icon.style.display = '';
    }
  }

  let _changeUserId = null;

  function _showChangeForm(uid) {
    _changeUserId = uid;
    document.querySelector('.wrap').style.display = 'none';
    document.getElementById('changeWrap').style.display = '';
    document.getElementById('newPassword').focus();
  }

  async function doChangePassword() {
    const btn  = document.getElementById('changeBtn');
    const txt  = document.getElementById('changeText');
    const icon = document.getElementById('changeIcon');
    const err  = document.getElementById('changeErr');
    const np   = document.getElementById('newPassword').value;
    const cp   = document.getElementById('confirmPassword').value;

    err.style.display = 'none';

    if (np.length < 8) {
      err.textContent = 'A senha deve ter pelo menos 8 caracteres.';
      err.style.display = 'block';
      return;
    }
    if (np !== cp) {
      err.textContent = 'As senhas não coincidem.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    txt.textContent = 'Salvando...';
    icon.style.display = 'none';

    try {
      const res = await fetch('/api/users/' + _changeUserId, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: np, role: 'admin', active: true})
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        globalThis.location.href = '/dashboard';
      } else {
        err.textContent = data.error || 'Erro ao salvar senha.';
        err.style.display = 'block';
        btn.disabled = false;
        txt.textContent = 'Definir senha';
        icon.style.display = '';
      }
    } catch (error_) {
      console.error(error_);
      err.textContent = 'Erro de conexão.';
      err.style.display = 'block';
      btn.disabled = false;
      txt.textContent = 'Definir senha';
      icon.style.display = '';
    }
  }
</script>
</body>
</html>
